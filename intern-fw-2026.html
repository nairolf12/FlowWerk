<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FlowWerk Keys">
<meta name="theme-color" content="#060A12">
<title>FlowWerk · Schlüssel-Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060A12;--card:#0E1A2E;--card2:#131E30;--blue:#4070FF;--teal:#00C4B0;
  --t1:#F0F4FF;--t2:#8899BB;--t3:#4A5C78;--bord:#1E2D42;--green:#22D3AA;--red:#FF5E7A;--amber:#FFBA42}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;min-height:100vh}
#lock{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px 20px}
.logo{font-size:2rem;font-weight:900}.logo b{background:linear-gradient(135deg,#4070FF,#00C4B0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:.85rem;color:var(--t3)}
.lock-in{width:100%;max-width:300px;padding:14px 18px;border-radius:12px;background:var(--card);border:1px solid var(--bord);color:var(--t1);font-size:1.1rem;font-family:inherit;text-align:center;letter-spacing:.15em;outline:none;-webkit-appearance:none}
.lock-in:focus{border-color:var(--blue)}
.lock-btn{width:100%;max-width:300px;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}
.err{font-size:.82rem;color:var(--red);height:20px;text-align:center}
#app{display:none;flex:1;flex-direction:column}
header{background:var(--card);border-bottom:1px solid var(--bord);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.hlogo{font-size:1rem;font-weight:800}.hlogo b{background:linear-gradient(135deg,#4070FF,#00C4B0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.obtn{background:none;border:1px solid var(--bord);color:var(--t3);padding:6px 12px;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.obtn:hover{border-color:var(--blue);color:var(--t1)}
.tabs{display:flex;background:var(--card2);border-bottom:1px solid var(--bord);position:sticky;top:53px;z-index:9}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:.8rem;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--t1);border-color:var(--blue)}
.pane{display:none;flex:1;overflow-y:auto;padding:16px;max-width:600px;margin:0 auto;width:100%}
.pane.on{display:block}
.card{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:18px;margin-bottom:14px}
.ct{font-size:.78rem;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
label{display:block;font-size:.8rem;color:var(--t2);margin:10px 0 4px}
label:first-of-type{margin-top:0}
input[type=text],input[type=email]{width:100%;padding:11px 13px;border-radius:9px;background:var(--card2);border:1px solid var(--bord);color:var(--t1);font-size:.95rem;font-family:inherit;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=email]:focus{border-color:var(--blue)}
.gtog{display:flex;gap:8px;margin-top:4px}
.gb{flex:1;padding:10px;border-radius:9px;border:1px solid var(--bord);background:var(--card2);color:var(--t2);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.gb.a1{background:var(--blue);border-color:var(--blue);color:#fff}
.gb.a2{background:var(--amber);border-color:var(--amber);color:#000}
.bp{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:14px;font-family:inherit}
.bs{width:100%;padding:11px;border-radius:11px;border:1px solid var(--bord);background:var(--card2);color:var(--t2);font-size:.88rem;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.kr{background:var(--card2);border:1px solid var(--teal);border-radius:12px;padding:16px;text-align:center;margin-top:14px;display:none}
.kt{font-family:ui-monospace,monospace;font-size:.95rem;font-weight:700;color:var(--teal);letter-spacing:.06em;word-break:break-all;margin-bottom:8px;white-space:pre-line;line-height:1.8}
.kb{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:999px;margin-bottom:10px}
.kb1{background:rgba(64,112,255,.15);color:var(--blue)}.kb2{background:rgba(255,186,66,.15);color:var(--amber)}
.hist-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hist-actions{display:flex;gap:6px;flex-wrap:wrap}
.hi{background:var(--card2);border:1px solid var(--bord);border-radius:11px;padding:13px;margin-bottom:9px}
.hk{font-family:ui-monospace,monospace;font-size:.82rem;color:var(--teal);margin-bottom:4px;word-break:break-all}
.hm{font-size:.72rem;color:var(--t3);line-height:1.6}
.ha{display:flex;gap:7px;margin-top:9px}
.hb{flex:1;padding:7px;border-radius:7px;border:1px solid var(--bord);background:var(--card);color:var(--t2);font-size:.75rem;cursor:pointer;font-family:inherit;text-align:center}
.hb:hover{border-color:var(--blue);color:var(--t1)}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:.88rem}
.vr{margin-top:12px;padding:13px;border-radius:11px;display:none;font-size:.88rem;line-height:1.7}
.vo{background:rgba(34,211,170,.08);border:1px solid rgba(34,211,170,.25);color:var(--green)}
.ve{background:rgba(255,94,122,.08);border:1px solid rgba(255,94,122,.25);color:var(--red)}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--teal);color:var(--teal);padding:10px 20px;
  border-radius:10px;font-size:.85rem;font-weight:600;pointer-events:none;opacity:0;
  transition:opacity .25s;z-index:999;white-space:nowrap}
.toast.on{opacity:1}
.spin{display:none;width:18px;height:18px;border:2px solid var(--bord);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="lock">
  <div class="logo">flow<b>Werk</b></div>
  <div class="sub">Schlüssel-Manager</div>
  <input type="password" class="lock-in" id="pw" placeholder="Passwort" autocomplete="current-password">
  <button class="lock-btn" onclick="unlock()">Entsperren</button>
  <div class="err" id="pw-err"></div>
</div>

<div id="app">
  <header>
    <div class="hlogo">flow<b>Werk</b> · Keys</div>
    <button class="obtn" onclick="logout()">Abmelden</button>
  </header>
  <div class="tabs">
    <div class="tab on" onclick="showTab('gen',this)">Erstellen</div>
    <div class="tab" onclick="showTab('hist',this)">Verlauf</div>
    <div class="tab" onclick="showTab('verify',this)">Prüfen</div>
  </div>

  <div class="pane on" id="tab-gen">
    <div class="card">
      <div class="ct">Schlüssel erstellen</div>
      <label>Version</label>
      <div class="gtog">
        <button class="gb a1" id="gb1" onclick="setGen(1)">Version 3.x</button>
        <button class="gb" id="gb2" onclick="setGen(2)">Version 4.x</button>
      </div>
      <label>Kundenname</label>
      <input type="text" id="g-name" placeholder="(ohne Name)" autocomplete="off">
      <label>E-Mail</label>
      <input type="email" id="g-email" placeholder="optional" autocomplete="off">
      <label>Notiz</label>
      <input type="text" id="g-note" placeholder="optional" autocomplete="off">
      <label>Anzahl (1–50)</label>
      <input type="text" id="g-count" value="1" inputmode="numeric">
      <button class="bp" onclick="createKey()">
        <span id="gen-label">Generieren</span>
        <div class="spin" id="gen-spin"></div>
      </button>
    </div>
    <div class="kr" id="kr">
      <div id="kbadge" class="kb kb1">Version 3.x</div>
      <div class="kt" id="kt"></div>
      <div style="font-size:.72rem;color:var(--t3);margin-bottom:12px" id="km"></div>
      <button class="bs" onclick="copyKey()">Kopieren</button>
    </div>
  </div>

  <div class="pane" id="tab-hist">
    <div class="hist-bar">
      <span style="font-size:.8rem;color:var(--t2)" id="hc"></span>
      <div class="hist-actions">
        <button class="obtn" onclick="exportKeys()">&#8595; JSON</button>
        <label class="obtn" style="cursor:pointer">&#8593; Import
          <input type="file" accept=".json" style="display:none" onchange="importKeys(event)">
        </label>
        <button class="obtn" style="color:var(--red);border-color:var(--red)" onclick="clearHist()">Leeren</button>
      </div>
    </div>
    <div id="hl"></div>
  </div>

  <div class="pane" id="tab-verify">
    <div class="card">
      <div class="ct">Schlüssel prüfen</div>
      <label>Schlüssel eingeben</label>
      <input type="text" id="vk" placeholder="FFLW-XXXX-XXXX-XXXX-XXXX"
             style="font-family:ui-monospace,monospace;letter-spacing:.05em;text-transform:uppercase"
             oninput="this.value=this.value.toUpperCase()">
      <button class="bp" onclick="verifyKey()">Prüfen</button>
      <div class="vr" id="vr"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ KONFIGURATION ══════════════════════════════════════════════════════════
const PW_HASH    = "8beac40a965281c38d7a854d26d4ea437811fe515b4fda69d770d872b25f6afa";
const GEN1_STR   = "finFlow-v1-2026-secret-by-FlowStudios";
const MASTER_HEX = "7f1dfd6127eb698cbdd09a718fe8f03d69b57c2bd6997343637eb2b76f1413fa";
const GEN_LABELS = {1:"Version 3.x", 2:"Version 4.x", 3:"Version 5.x"};
// ══════════════════════════════════════════════════════════════════════════

// ── Crypto (Web Crypto API – funktioniert auf HTTPS) ──────────────────────
async function sha256hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function hmacSha256(keyBytes, dataBytes) {
  const key = await crypto.subtle.importKey(
    "raw", keyBytes, {name:"HMAC",hash:"SHA-256"}, false, ["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC", key, dataBytes));
}

function hexToBytes(hex) {
  const b = new Uint8Array(hex.length/2);
  for(let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.slice(i,i+2),16);
  return b;
}

function bytesToHex(buf) {
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function secretForGen(gen) {
  if(gen===1) return new TextEncoder().encode(GEN1_STR);
  const master = hexToBytes(MASTER_HEX);
  return await hmacSha256(master, new TextEncoder().encode(`finFlow-gen-${gen}`));
}

async function generateKey(gen) {
  const nonce  = crypto.getRandomValues(new Uint8Array(4));
  const secret = await secretForGen(gen);
  const sig    = await hmacSha256(secret, nonce);
  const raw    = bytesToHex(new Uint8Array([...nonce,...sig.slice(0,4)])).toUpperCase();
  return `FFLW-${raw.slice(0,4)}-${raw.slice(4,8)}-${raw.slice(8,12)}-${raw.slice(12,16)}`;
}

async function checkKey(key) {
  key = key.trim().toUpperCase().replace(/\s/g,'');
  if(!/^FFLW-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}$/.test(key)) return 0;
  const payload  = hexToBytes(key.replace(/-/g,'').slice(4));
  const nonce    = payload.slice(0,4);
  const givenSig = payload.slice(4,8);
  for(let gen=1;gen<=5;gen++) {
    const secret = await secretForGen(gen);
    const sig    = await hmacSha256(secret, nonce);
    if([0,1,2,3].every(i=>givenSig[i]===sig[i])) return gen;
  }
  return 0;
}

// ── Auth ──────────────────────────────────────────────────────────────────
let _auth = false;

async function unlock() {
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('pw-err');
  try {
    const h = await sha256hex(pw);
    if(h === PW_HASH) {
      _auth = true;
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display  = 'flex';
      renderHist();
    } else {
      errEl.textContent = 'Falsches Passwort.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
      setTimeout(()=>errEl.textContent='', 2500);
    }
  } catch(e) {
    errEl.textContent = 'Fehler: '+e.message;
  }
}

function logout() { _auth=false; location.reload(); }

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(n, el) {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+n).classList.add('on');
  el.classList.add('on');
  if(n==='hist') renderHist();
}

// ── Generation ────────────────────────────────────────────────────────────
let _gen=1, _lastKeys=[];

function setGen(g) {
  _gen=g;
  document.getElementById('gb1').className='gb'+(g===1?' a1':'');
  document.getElementById('gb2').className='gb'+(g===2?' a2':'');
  document.getElementById('kr').style.display='none';
}

// ── Erstellen ─────────────────────────────────────────────────────────────
async function createKey() {
  const btn   = document.getElementById('gen-label');
  const spin  = document.getElementById('gen-spin');
  const n     = Math.max(1,Math.min(50,parseInt(document.getElementById('g-count').value)||1));
  const name  = document.getElementById('g-name').value.trim()||'(ohne Name)';
  const email = document.getElementById('g-email').value.trim();
  const note  = document.getElementById('g-note').value.trim();
  const gen   = _gen;

  btn.style.display='none'; spin.style.display='block';
  _lastKeys=[];
  for(let i=0;i<n;i++) _lastKeys.push(await generateKey(gen));
  btn.style.display=''; spin.style.display='none';

  document.getElementById('kt').textContent    = _lastKeys.join('
');
  document.getElementById('km').textContent    = name+(email?' · '+email:'')+(note?' · '+note:'')+' · '+new Date().toLocaleDateString('de');
  document.getElementById('kbadge').textContent = GEN_LABELS[gen]||'Gen '+gen;
  document.getElementById('kbadge').className  = 'kb kb'+gen;
  document.getElementById('kr').style.display  = 'block';

  const hist = getHist();
  _lastKeys.forEach(k=>hist.unshift({key:k,gen,name,email,note,date:new Date().toISOString()}));
  saveHist(hist.slice(0,500));
}

function copyKey() {
  navigator.clipboard.writeText(_lastKeys.join('
')).then(()=>toast('Kopiert!'));
}

// ── Verlauf ───────────────────────────────────────────────────────────────
const HK = 'ffkg';
function getHist()   { try{return JSON.parse(localStorage.getItem(HK)||'[]')}catch{return[]} }
function saveHist(h) { localStorage.setItem(HK,JSON.stringify(h)) }

function renderHist() {
  const h  = getHist();
  const el = document.getElementById('hl');
  document.getElementById('hc').textContent = h.length+' Schlüssel gespeichert';
  if(!h.length) { el.innerHTML='<div class="empty">Noch keine Schlüssel generiert.</div>'; return; }
  el.innerHTML = h.map((e,i)=>`
    <div class="hi">
      <div class="hk">${e.key}</div>
      <div class="hm">
        <span class="kb kb${e.gen}" style="font-size:.65rem;padding:2px 8px">${GEN_LABELS[e.gen]||'Gen '+e.gen}</span>
        ${e.name!=='(ohne Name)'?' · '+e.name:''}${e.email?' · '+e.email:''}${e.note?' · '+e.note:''}
        · ${new Date(e.date).toLocaleDateString('de')}
      </div>
      <div class="ha">
        <button class="hb" onclick="copyOne(${i})">Kopieren</button>
        <button class="hb" onclick="delOne(${i})" style="color:var(--red)">Löschen</button>
      </div>
    </div>`).join('');
}

function copyOne(i) { navigator.clipboard.writeText(getHist()[i].key).then(()=>toast('Kopiert!')) }
function delOne(i)  { const h=getHist();h.splice(i,1);saveHist(h);renderHist() }
function clearHist() {
  if(confirm('Gesamten Verlauf löschen? Bitte vorher exportieren!')) {
    localStorage.removeItem(HK); renderHist();
  }
}

// ── Export / Import ───────────────────────────────────────────────────────
function exportKeys() {
  const h = getHist();
  if(!h.length) { toast('Keine Keys vorhanden'); return; }
  const json = JSON.stringify({version:1,app:'flowwerk-keygen',exported:new Date().toISOString(),keys:h},null,2);
  const a    = Object.assign(document.createElement('a'),{
    href: URL.createObjectURL(new Blob([json],{type:'application/json'})),
    download: 'flowwerk_keys_'+new Date().toISOString().slice(0,10)+'.json'
  });
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exportiert');
}

function importKeys(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const incoming = data.keys||[];
      if(!incoming.length) { toast('Keine Keys in Datei'); return; }
      const existing = getHist();
      const known    = new Set(existing.map(k=>k.key));
      const neu      = incoming.filter(k=>!known.has(k.key));
      saveHist([...neu,...existing].slice(0,500));
      renderHist();
      toast(neu.length+' Keys importiert');
    } catch(err) { toast('Fehler: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── Prüfen ────────────────────────────────────────────────────────────────
async function verifyKey() {
  const key = document.getElementById('vk').value.trim();
  const el  = document.getElementById('vr');
  el.style.display='none';
  const gen = await checkKey(key);
  if(gen) {
    el.className='vr vo';
    el.innerHTML=`✓ Gültiger Schlüssel<br><strong>${GEN_LABELS[gen]||'Gen '+gen}</strong>`;
  } else {
    el.className='vr ve';
    el.innerHTML='✗ Ungültiger Schlüssel';
  }
  el.style.display='block';
}

// ── Toast & Init ──────────────────────────────────────────────────────────
function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),1800);
}

document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock() });
</script>
</body>
</html>
