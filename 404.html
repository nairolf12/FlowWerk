<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Seite nicht gefunden – FlowWerk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:#060A12;color:#F0F4FF;min-height:100vh;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;-webkit-font-smoothing:antialiased}
.code{font-size:6rem;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#4070FF,#00C4B0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:16px}
h1{font-size:1.3rem;font-weight:700;margin-bottom:10px}
p{color:#8899BB;font-size:.95rem;margin-bottom:32px;max-width:400px;line-height:1.7}
a{display:inline-block;padding:13px 32px;border-radius:11px;
  background:linear-gradient(135deg,#4070FF,#00C4B0);color:#fff;
  text-decoration:none;font-weight:700;font-size:.95rem;transition:opacity .2s}
a:hover{opacity:.87}
.logo{position:fixed;top:24px;font-size:1.1rem;font-weight:800}
.logo b{background:linear-gradient(135deg,#4070FF,#00C4B0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style>
</head>
<body>
<div class="logo">flow<b>Werk</b></div>
<div class="code">404</div>
<h1>Seite nicht gefunden</h1>
<p>Die gesuchte Seite existiert nicht oder wurde verschoben.</p>
<a href="/">Zur Startseite</a>
</body>
</html>
